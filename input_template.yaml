bunch:
  charge_nC: 1.0
  density:
    # Use one of: gaussian, array
    kind: gaussian

    # Gaussian option:
    sigma_mm: 2.0
    cutoff_sigma: 0.0

    # Arbitrary density option:
    # kind: array
    # Compact string form accepted by the parser:
    # samples: "{{-120,0.15},{-60,0.8},{0,1},{60,0.8},{120,0.15}}"
    #
    # Also accepted:
    # samples: [[-120, 0.15], [-60, 0.8], [0, 1], [60, 0.8], [120, 0.15]]
    interpolation_order: 5

  longitudinal_grid:
    dz_mm: 0.02
    no_cut_span_sigma: 8.0

chamber:
  # Use one of: round, ellipse, polygon
  kind: round

  # Round option:
  radius_mm: 50.0

  # Ellipse option:
  # a_mm: 40.0
  # b_mm: 20.0

  # Polygon option:
  #points_mm:
  #  - [-10.0, 20.0]
  #  - [10.0, 20.0]
  #  - [40.0, 8.0]
  #  - [40.0, -8.0]
  #  - [10.0, -20.0]
  #  - [-10.0, -20.0]
  #  - [-40.0, -8.0]
  #  - [-40.0, 8.0]

  boundary_elements: 320
  quadrature_order: 8

buttons:
  # `corners` means four pickups on the diagonals using labels A/B/C/D.
  # `cardinal` means top/right/bottom/left using labels T/R/B/L.
  layout: corners
  radius_mm: 4.0
  thickness_mm: 2.0
  gap_mm: 0.3
  capacitance_pf: 3.4
  pickups:
    - label: A
      center_mm: [-35, 35]
      color: tab:orange
    - label: B
      center_mm: [35, 35]
      color: tab:green
    - label: C
      center_mm: [35, -35]
      color: tab:red
    - label: D
      center_mm: [-35, -35]
      color: tab:purple

filter:
  characteristic_impedance_ohm: 50.0

  cable:
    enabled: true
    attenuation_fc_hz: 4.65e8

  analog:
    # Use one of: none, lowpass_butter, bandpass_butter
    type: lowpass_butter
    order: 4
    cutoff_hz: 1.3e8

    # Band-pass example:
    # type: bandpass_butter
    # order: 2
    # center_hz: 5.0e8
    # bandwidth_hz: 2.0e7

  resolution:
    relative_error_min: 1.0e-4
    relative_error_max: 1.0e-2
    num_points: 200
    reference_relative_error: 1.6e-3

beam_grid:
  x_half_size_mm: 30.0
  y_half_size_mm: 30.0
  nx: 51
  ny: 51
  linear_fit_half_range_mm: 10.0
  polynomial_order: 5

output:
  directory: outputs/template_run
